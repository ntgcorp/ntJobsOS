[CONFIG]
; Configurazione generale ntJobsApp
TYPE=NTJOBS.APP.1
NAME=SENDMAIL_NTJOBSOS
LOG=Log/ntjobsos_sendmail_smtp.log
EXIT=TRUE
; DA SPECIFICARE
SENDMAIL_PATH=G:\Il mio Drive\Progetti\ntJobsAi2\Apps\ntj_sendmail

; --- Configurazione Specifica Applicazione ---
; Definisce l'engine SMTP come richiesto
MAIL.ENGINE=OLK

; Nome del file JSON (deve essere nella stessa cartella o path completo)
FILE.IN.JSON=$SENDMAIL_PATH/Json/ntjobsos.json

; Delimitatore per liste di email nel JSON (default virgola)
DELIMITER=,

; --- Parametri di Attesa ---
; Attesa iniziale prima di partire (secondi)
WAIT.START=3
; Attesa tra una mail e l'altra (secondi)
WAIT.MAIL=5

[JOB_01_AVVIO]
; Avvia esplicitamente Outlook (o si aggancia se già aperto)
COMMAND=OLK.START

[JOB_02_INVIO]
; Esegue il ciclo di lettura JSON e invio mail
COMMAND=SEND

; [JOB_03_CHIUSURA]
; Opzionale: Decommentare le righe sotto se si vuole chiudere Outlook alla fine
; COMMAND=OLK.KILL